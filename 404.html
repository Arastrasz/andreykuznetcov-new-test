<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — The Archives of Clan Lar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --font-display: 'Cinzel', serif;
            --font-body: 'Cormorant Garamond', serif;
            --bg-deep: #0a0b10;
            --text-primary: #d4d0c8;
            --text-dim: #7a7670;
            --text-faint: #4a4640;
            --crimson: #d4556a;
            --ayleid-blue: #5a8a9e;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-body);
            color: var(--text-primary);
            background: var(--bg-deep);
            overflow: hidden;
        }

        /* Background image with overlay */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: url('img/backgrounds/bg-cyrodiil.jpg') center/cover no-repeat;
        }
        .bg-layer::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(10,11,16,0.65) 0%, rgba(10,11,16,0.9) 100%);
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 3rem 2rem;
            max-width: 520px;
        }

        .ornament {
            color: var(--text-faint);
            font-size: 0.65rem;
            letter-spacing: 0.5em;
            margin-bottom: 1.5rem;
        }

        .code {
            font-family: var(--font-display);
            font-size: clamp(3rem, 8vw, 5rem);
            letter-spacing: 0.15em;
            color: var(--text-dim);
            font-weight: 400;
            line-height: 1;
            margin-bottom: 0.5rem;
            opacity: 0.6;
        }

        h1 {
            font-family: var(--font-display);
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            font-weight: 400;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
        }

        .message {
            font-size: 1.05rem;
            font-style: italic;
            color: var(--text-dim);
            line-height: 1.9;
            margin-bottom: 2.5rem;
        }

        .link {
            display: inline-block;
            font-family: var(--font-display);
            font-size: 0.55rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--text-primary);
            text-decoration: none;
            padding: 0.8em 2.5em;
            border: 1px solid rgba(160,160,170,0.15);
            transition: all 0.4s ease;
            border-radius: 2px;
        }
        .link:hover {
            border-color: var(--ayleid-blue);
            color: var(--ayleid-blue);
            box-shadow: 0 0 20px rgba(90,138,158,0.08);
        }

        .ornament-bottom {
            color: var(--text-faint);
            font-size: 0.65rem;
            letter-spacing: 0.5em;
            margin-top: 2.5rem;
        }

        /* Subtle entrance animation */
        .content {
            animation: fadeIn 1s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="content">
        <div class="ornament">◆ ━━━ ◇ ━━━ ◆</div>
        <div class="code">404</div>
        <h1>Path Not Found</h1>
        <p class="message">
            The road you seek has crumbled, or perhaps it never was.<br>
            Even the Ayleids could not chart every passage.
        </p>
        <a href="/" class="link">Return to the Archives</a>
        <div class="ornament-bottom">◆ ━━━ ◇ ━━━ ◆</div>
    </div>
</body>
</html>
